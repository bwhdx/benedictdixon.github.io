<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — Benedict W. H. Dixon</title>
<link rel="canonical" href="https://benedictdixon.com/">
<link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
<meta name="theme-color" content="#1c267a">
<link rel="preload" href="/assets/fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
<style>
  @font-face {
    font-family: 'Fraunces';
    font-style: normal;
    font-weight: 300 700;
    font-display: swap;
    src: url('/assets/fonts/fraunces-latin.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
    src: url('/assets/fonts/inter-latin.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 100 800;
    font-display: swap;
    src: url('/assets/fonts/jetbrains-mono-latin.woff2') format('woff2');
  }
  :root { --ink: #1c267a; --paper: #d6c585; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    display: grid;
    place-items: center;
    padding: 32px;
  }
  main {
    max-width: 640px;
    text-align: center;
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(64px, 14vw, 144px);
    margin: 0 0 16px;
    line-height: 0.9;
  }
  h1 em { font-style: italic; font-weight: 400; }
  p { font-size: 18px; line-height: 1.5; margin: 16px 0; }
  a {
    color: var(--ink);
    font-weight: 500;
    text-decoration: none;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
  }
  a:hover { opacity: 0.7; }
  hr {
    border: 0;
    border-top: 1px solid var(--ink);
    opacity: 0.4;
    margin: 32px auto;
    max-width: 320px;
  }
</style>
</head>
<body>
  <main>
    <p class="meta">§ 404 · Off the page</p>
    <h1>Not <em>here.</em></h1>
    <p>The page you're after doesn't exist. Probably a stale link.</p>
    <hr>
    <p><a href="/">Return to the cover →</a></p>
  </main>
</body>
</html>
